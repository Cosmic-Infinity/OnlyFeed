services:
  # Local Development Database
  postgres:
    image: postgres:16-alpine
    container_name: onlyfeed-db
    environment:
      POSTGRES_DB: onlyfeed
      POSTGRES_USER: onlyfeed
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_IN_PROD}
    ports:
      - "5430:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlyfeed -d onlyfeed"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: onlyfeed-backend
    working_dir: /workspace/backend
    command: mvn spring-boot:run
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: onlyfeed
      DB_USERNAME: onlyfeed
      DB_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_IN_PROD}
      JWT_SECRET: ${JWT_SECRET:-SUPER_SECRET_KEY_FOR_JWT_THAT_IS_AT_LEAST_32_CHARS}
      JWT_EXPIRATION_MS: 604800000
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_PASSWORD:-CHANGE_ME_IN_PROD}
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/workspace/backend
      - maven-cache:/root/.m2

volumes:
  postgres-data:
  maven-cache:
