server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:onlyfeed}
    username: ${DB_USERNAME:onlyfeed}
    password: ${DB_PASSWORD:CHANGE_ME_IN_PROD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: warn

app:
  jwt:
    secret: ${JWT_SECRET:SUPER_SECRET_KEY_FOR_JWT_THAT_IS_AT_LEAST_32_CHARS}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,https://localhost:*}
  admin:
    bootstrap-username: ${ADMIN_BOOTSTRAP_USERNAME:}
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD:}
